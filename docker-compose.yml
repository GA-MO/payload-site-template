services:
  postgres:
    image: postgres:17-alpine
    container_name: payload_site_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5433:5432"
    volumes:
      - payload_site_pg_data:/var/lib/postgresql/data

volumes:
  payload_site_pg_data:
